# Nexus - Deployment Compose (for pulling from GitHub Container Registry)
# Usage:
#   1. Copy this file and .env.example to your deployment host
#   2. Rename .env.example to .env and fill in your values
#   3. Create a ./conf directory for persistent config
#   4. Run: docker compose -f docker-compose.deploy.yml up -d

services:
  nexus-web:
    image: ghcr.io/jayarep/nexus:latest
    container_name: nexus-app
    ports:
      - "8080:8080"
    volumes:
      - ./conf:/app/conf
      - nexus-ps-modules:/usr/local/share/powershell/Modules
      - nexus-py-packages:/usr/local/lib/python3.10/dist-packages
    environment:
      - POWERSHELL_TELEMETRY_OPTOUT=1
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - NEXUS_CREDENTIAL_KEY=${NEXUS_CREDENTIAL_KEY}
    restart: unless-stopped
    networks:
      - nexus-network

networks:
  nexus-network:
    driver: bridge

volumes:
  nexus-ps-modules:
  nexus-py-packages:
