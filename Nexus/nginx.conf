# Rate limiting zone for login
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

server {
    listen 8080 ssl;
    ssl_certificate /app/conf/cert.pem;
    ssl_certificate_key /app/conf/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Rate limit login endpoint
    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Terminal — require auth via Pode subrequest before proxying to ttyd
    # The token is passed as ?token= query param since iframes can't set Authorization headers
    location /terminal/ {
        auth_request /internal/check-terminal;
        auth_request_set $auth_status $upstream_status;
        error_page 401 = @terminal_denied;

        proxy_pass http://127.0.0.1:7681;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location @terminal_denied {
        return 302 /login;
    }

    # Internal auth check - forwards the original query string so Pode can read ?token=
    location = /internal/check-terminal {
        internal;
        proxy_pass http://127.0.0.1:8081/api/auth/check-terminal?$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # Everything else — proxy to Pode
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600;
        proxy_send_timeout 600;
    }
}
